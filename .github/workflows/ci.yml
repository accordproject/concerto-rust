name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # Style and lint gating is scoped to hand-written crates; the generated
      # `concerto-metamodel` crate is excluded from fmt/clippy enforcement.
      - name: Format check (concerto-core)
        run: cargo fmt -p concerto-core -- --check

      - name: Clippy (concerto-core)
        run: cargo clippy -p concerto-core --no-deps --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Test workspace
        run: cargo test --workspace
